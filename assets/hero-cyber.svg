<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Shan Hefu technology profile header</title>
  <desc id="desc">Computer vision, representation learning, and full-stack engineering.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.52" stop-color="#111827"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#06b6d4" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#22d3ee" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="titleGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e2e8f0"/>
      <stop offset="0.6" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#a5b4fc"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.08"/>
    </pattern>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="420" rx="28" fill="url(#grid)"/>
  <ellipse cx="980" cy="78" rx="260" ry="160" fill="#4f46e5" opacity="0.12" filter="url(#soft)"/>
  <ellipse cx="155" cy="360" rx="260" ry="150" fill="#0891b2" opacity="0.1" filter="url(#soft)"/>

  <g opacity="0.85">
    <path d="M0 94H160L196 58H334" fill="none" stroke="#22d3ee" stroke-width="2" stroke-opacity="0.38"/>
    <circle cx="160" cy="94" r="5" fill="#22d3ee" filter="url(#glow)"/>
    <circle cx="334" cy="58" r="4" fill="#818cf8"/>
    <path d="M1200 318H1042L998 362H855" fill="none" stroke="#818cf8" stroke-width="2" stroke-opacity="0.38"/>
    <circle cx="1042" cy="318" r="5" fill="#818cf8" filter="url(#glow)"/>
    <circle cx="855" cy="362" r="4" fill="#22d3ee"/>
  </g>

  <g transform="translate(72 54)">
    <rect width="190" height="38" rx="19" fill="#0f172a" stroke="#22d3ee" stroke-opacity="0.55"/>
    <circle cx="22" cy="19" r="6" fill="#22c55e" filter="url(#glow)">
      <animate attributeName="opacity" values="1;0.35;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="42" y="25" fill="#cbd5e1" font-family="Segoe UI,Arial,sans-serif" font-size="15" font-weight="700" letter-spacing="2">SYSTEM ONLINE</text>
  </g>

  <text x="72" y="178" fill="url(#titleGradient)" font-family="Segoe UI,Arial,sans-serif" font-size="78" font-weight="800" letter-spacing="3">SHAN HEFU</text>
  <rect x="72" y="202" width="620" height="3" rx="2" fill="url(#line)"/>
  <text x="72" y="252" fill="#cbd5e1" font-family="Segoe UI,Arial,sans-serif" font-size="25" font-weight="600" letter-spacing="1.5">COMPUTER VISION · REPRESENTATION LEARNING</text>
  <text x="72" y="292" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="21" letter-spacing="1.2">M.S. COMPUTER SCIENCE · SOPHIA UNIVERSITY · TOKYO</text>

  <g transform="translate(72 332)" font-family="Segoe UI,Arial,sans-serif" font-size="16" font-weight="700" letter-spacing="1">
    <rect width="215" height="46" rx="12" fill="#082f49" stroke="#06b6d4" stroke-opacity="0.75"/>
    <text x="107.5" y="29" fill="#67e8f9" text-anchor="middle">Computer Vision</text>
    <rect x="231" width="250" height="46" rx="12" fill="#1e1b4b" stroke="#818cf8" stroke-opacity="0.75"/>
    <text x="356" y="29" fill="#c7d2fe" text-anchor="middle">Deep Learning</text>
    <rect x="497" width="235" height="46" rx="12" fill="#052e2b" stroke="#22c55e" stroke-opacity="0.7"/>
    <text x="614.5" y="29" fill="#86efac" text-anchor="middle">FULL-STACK</text>
  </g>

  <g transform="translate(887 102)">
    <circle cx="118" cy="105" r="98" fill="none" stroke="#334155" stroke-width="2"/>
    <circle cx="118" cy="105" r="75" fill="none" stroke="#22d3ee" stroke-width="2" stroke-dasharray="6 10" opacity="0.75">
      <animateTransform attributeName="transform" type="rotate" from="0 118 105" to="360 118 105" dur="18s" repeatCount="indefinite"/>
    </circle>
    <circle cx="118" cy="105" r="48" fill="#0f172a" stroke="#818cf8" stroke-width="2"/>
    <path d="M118 58L158 128H78Z" fill="none" stroke="#22d3ee" stroke-width="3" filter="url(#glow)"/>
    <circle cx="118" cy="105" r="8" fill="#e2e8f0"/>
    <g fill="#22d3ee">
      <circle cx="118" cy="7" r="4"/><circle cx="216" cy="105" r="4"/><circle cx="118" cy="203" r="4"/><circle cx="20" cy="105" r="4"/>
    </g>
    <text x="118" y="240" text-anchor="middle" fill="#64748b" font-family="Segoe UI,Arial,sans-serif" font-size="13" letter-spacing="2">VISION CORE / 01</text>
  </g>

  <rect x="0" y="0" width="1200" height="5" fill="url(#line)">
    <animate attributeName="y" values="0;415;0" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.45;0" dur="7s" repeatCount="indefinite"/>
  </rect>
</svg>
