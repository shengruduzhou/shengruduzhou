<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Computer vision focus map</title>
  <desc id="desc">Panoramic input is encoded with self-supervised representation learning and applied to dense visual prediction.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#050b18"/><stop offset="1" stop-color="#111827"/></linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#0891b2"/><stop offset="1" stop-color="#22d3ee"/></linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#4338ca"/><stop offset="1" stop-color="#818cf8"/></linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M32 0H0V32" fill="none" stroke="#38bdf8" stroke-opacity="0.06"/></pattern>
  </defs>
  <rect width="1200" height="360" rx="24" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="24" fill="url(#grid)"/>

  <text x="48" y="56" fill="#e2e8f0" font-family="Segoe UI,Arial,sans-serif" font-size="25" font-weight="800" letter-spacing="2">CV FOCUS MAP</text>
  <text x="1140" y="56" text-anchor="end" fill="#64748b" font-family="Segoe UI,Arial,sans-serif" font-size="14" letter-spacing="2">VISION PIPELINE / 2026</text>
  <line x1="48" y1="78" x2="1152" y2="78" stroke="#334155"/>

  <g font-family="Segoe UI,Arial,sans-serif">
    <g transform="translate(55 116)">
      <rect width="300" height="170" rx="20" fill="#071827" stroke="#0e7490" stroke-width="2"/>
      <circle cx="64" cy="59" r="32" fill="#083344" stroke="#22d3ee" stroke-width="2"/>
      <path d="M35 59c18-18 40-18 58 0M35 59c18 18 40 18 58 0M64 27c-14 18-14 46 0 64M64 27c14 18 14 46 0 64" fill="none" stroke="#67e8f9" stroke-width="2"/>
      <text x="112" y="54" fill="#67e8f9" font-size="16" font-weight="800" letter-spacing="1">01 / INPUT</text>
      <text x="112" y="82" fill="#e2e8f0" font-size="23" font-weight="700">360° Panorama</text>
      <text x="28" y="132" fill="#94a3b8" font-size="16">Spherical visual data</text>
      <text x="28" y="157" fill="#94a3b8" font-size="16">Tangent / panoramic views</text>
    </g>

    <path d="M320 201H415" stroke="url(#cyan)" stroke-width="4" stroke-linecap="round"/>
    <path d="M405 191L420 201L405 211" fill="none" stroke="#22d3ee" stroke-width="4"/>
    <circle cx="365" cy="201" r="5" fill="#22d3ee" filter="url(#glow)"><animate attributeName="cx" values="330;405;330" dur="2.4s" repeatCount="indefinite"/></circle>

    <g transform="translate(430 103)">
      <rect width="330" height="196" rx="22" fill="#11133a" stroke="#6366f1" stroke-width="2"/>
      <rect x="26" y="25" width="278" height="42" rx="10" fill="#1e1b4b" stroke="#818cf8"/>
      <text x="165" y="52" text-anchor="middle" fill="#c7d2fe" font-size="16" font-weight="800" letter-spacing="1">02 / LEARNING CORE</text>
      <g transform="translate(48 92)">
        <circle cx="20" cy="20" r="16" fill="#312e81" stroke="#a5b4fc"/>
        <circle cx="88" cy="20" r="16" fill="#312e81" stroke="#a5b4fc"/>
        <circle cx="156" cy="20" r="16" fill="#312e81" stroke="#a5b4fc"/>
        <circle cx="224" cy="20" r="16" fill="#312e81" stroke="#a5b4fc"/>
        <path d="M36 20H72M104 20H140M172 20H208" stroke="#818cf8" stroke-width="3"/>
      </g>
      <text x="165" y="158" text-anchor="middle" fill="#e2e8f0" font-size="24" font-weight="700">Representation Learning</text>
      <text x="165" y="184" text-anchor="middle" fill="#94a3b8" font-size="16">Self-supervised visual encoder</text>
    </g>

    <path d="M775 201H865" stroke="url(#violet)" stroke-width="4" stroke-linecap="round"/>
    <path d="M855 191L870 201L855 211" fill="none" stroke="#818cf8" stroke-width="4"/>
    <circle cx="820" cy="201" r="5" fill="#818cf8" filter="url(#glow)"><animate attributeName="cx" values="785;855;785" dur="2.4s" repeatCount="indefinite"/></circle>

    <g transform="translate(880 104)">
      <rect width="265" height="194" rx="22" fill="#071827" stroke="#22c55e" stroke-width="2"/>
      <text x="28" y="45" fill="#86efac" font-size="16" font-weight="800" letter-spacing="1">03 / OUTPUT</text>
      <g transform="translate(28 70)">
        <rect width="209" height="31" rx="8" fill="#052e2b" stroke="#16a34a"/>
        <text x="104.5" y="21" text-anchor="middle" fill="#dcfce7" font-size="16" font-weight="700">Semantic Segmentation</text>
        <rect y="42" width="209" height="31" rx="8" fill="#082f49" stroke="#0891b2"/>
        <text x="104.5" y="63" text-anchor="middle" fill="#cffafe" font-size="16" font-weight="700">Depth Estimation</text>
        <rect y="84" width="209" height="31" rx="8" fill="#1e1b4b" stroke="#6366f1"/>
        <text x="104.5" y="105" text-anchor="middle" fill="#e0e7ff" font-size="16" font-weight="700">Surface Normal</text>
      </g>
    </g>
  </g>
</svg>
