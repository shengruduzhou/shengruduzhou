<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="118" viewBox="0 0 1200 118" role="img" aria-labelledby="title">
  <title id="title">Development telemetry console</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#020617"/><stop offset="0.58" stop-color="#0f172a"/><stop offset="1" stop-color="#052e2b"/></linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#818cf8"/><stop offset="1" stop-color="#22c55e"/></linearGradient>
  </defs>
  <rect width="1200" height="118" rx="20" fill="url(#bg)"/>
  <rect x="0" y="0" width="8" height="118" rx="4" fill="url(#bar)"/>
  <rect x="39" y="31" width="54" height="54" rx="13" fill="#111827" stroke="#818cf8" stroke-width="2"/>
  <path d="M52 69V57M64 69V46M76 69V38" stroke="#a5b4fc" stroke-width="5" stroke-linecap="round"/>
  <text x="120" y="53" fill="#e2e8f0" font-family="Segoe UI,Arial,sans-serif" font-size="28" font-weight="800" letter-spacing="2">DEVELOPMENT TELEMETRY</text>
  <text x="120" y="81" fill="#64748b" font-family="Segoe UI,Arial,sans-serif" font-size="15" font-weight="700" letter-spacing="2">WAKATIME · LANGUAGES · EDITORS · PROJECTS · PRODUCTIVITY</text>
  <g transform="translate(898 33)" font-family="Segoe UI,Arial,sans-serif">
    <rect width="235" height="52" rx="12" fill="#052e2b" stroke="#22c55e"/>
    <circle cx="25" cy="26" r="7" fill="#22c55e"><animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/></circle>
    <text x="44" y="22" fill="#86efac" font-size="12" font-weight="800" letter-spacing="1">DATA CHANNEL</text>
    <text x="44" y="40" fill="#dcfce7" font-size="15" font-weight="700">DAILY / AUTOMATED</text>
  </g>
</svg>
