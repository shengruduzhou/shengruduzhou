name: Waka Readme

on:
  schedule:
    # 03:35 JST / 18:35 UTC
    - cron: "35 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: waka-readme
  cancel-in-progress: true

jobs:
  update-readme:
    name: Refresh development telemetry
    runs-on: ubuntu-latest

    steps:
      - name: Update WakaTime section
        uses: athul/waka-readme@v0.3.1
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          SHOW_TITLE: false
          TIME_RANGE: last_7_days
          LANG_COUNT: 5
          SHOW_TIME: true
          SHOW_TOTAL: true
          CODE_LANG: txt
          SECTION_NAME: waka
          COMMIT_MESSAGE: "chore: refresh development telemetry"
