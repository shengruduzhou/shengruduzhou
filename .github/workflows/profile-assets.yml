name: Generate Profile Assets

on:
  schedule:
    # 03:20 JST / 18:20 UTC
    - cron: "20 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-assets
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v5

      - name: Generate 3D contribution calendar
        uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Generate contribution snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            assets/contribution-snake.svg?palette=github-light&color_snake=06b6d4
            assets/contribution-snake-dark.svg?palette=github-dark&color_snake=22d3ee
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit generated assets
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile-3d-contrib assets

          if git diff --cached --quiet; then
            echo "No profile asset changes."
            exit 0
          fi

          git commit -m "chore: refresh profile activity assets"
          git push
